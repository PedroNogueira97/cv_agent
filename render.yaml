services:
  # 🚀 Backend Service (FastAPI)
  - type: web
    name: cv-agent-api
    env: docker
    dockerfilePath: Dockerfile.api
    plan: free # Ou 'starter' se quiser usar o Disco (Disco não está no plano free)
    region: ohio
    envVars:
      - key: DATABASE_DIR
        value: /data
      - key: DATABASE_FILENAME
        value: cv_agent.db
      - fromGroup: cv-agent-secrets
    # Configuração de Disco Persistente (Requer plano Starter ou superior)
    # Se quiser testar no Free, comente o bloco 'disk' abaixo (dados resetam no restart)
    disk:
      name: cv-db-storage
      mountPath: /data
      sizeGB: 1

  # 🎨 Frontend Service (Streamlit)
  - type: web
    name: cv-agent-ui
    env: docker
    dockerfilePath: Dockerfile.app
    plan: free
    region: ohio
    envVars:
      - key: API_URL
        fromService:
          type: web
          name: cv-agent-api
          property: host
      - fromGroup: cv-agent-secrets

envVarGroups:
  - name: cv-agent-secrets
    envVars:
      - key: OPENAI_API_KEY
        sync: false # Você preencherá no dashboard do Render
      - key: TAVILY_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: ALLOWED_ORIGINS
        value: "*" # Ajuste para a URL final do seu app Streamlit depois
